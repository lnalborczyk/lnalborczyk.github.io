# Exercice - The marbles bag (from McElreath, 2015)

Let's say we have a bag containing four marbles. These marbles come in two colours: blue and white. We know there are four marbles in the bag, but we don't know how many of them are blue...

--

We know there are five possibilities (we call these possibilities our **hypotheses** about the content of the bag):

&lt;br&gt;

&lt;p align = "center"&gt; &amp;#9898 &amp;#9898 &amp;#9898 &amp;#9898&lt;/p&gt;

# Exercice - The marbles bag (from McElreath, 2015)

Our goal is to determine which hypothesis is the most plausible, given some **evidence** about the content of the bag. To obtain evidence, we can pull some marbles from the bag (with replacement). We do this three times and obtain the following sequence:

&lt;p align = "center"&gt;&amp;#128309 &amp;#9898 &amp;#128309&lt;/p&gt;

--

This sequence represents some evidence about the content of the bag (in other words, our data). From there, what **inference** can we reasonably make about the content of the bag? What can we say about the relative plausibility of each hypothesis?

# Accumulating evidence

We previously considered that all hypotheses were a priori equiprobable (cf. the [principle of indifference](https://en.wikipedia.org/wiki/Principle_of_indifference)).

--

However, we could have prior knowledge, either coming from our beliefs, from previous data or from knowledge about usual bags of this kind.

--

Let's say we pull another marble out of the bag. How can we incorporate this new information into our previous analysis?

---

# From counts to probability

The probability of a hypothesis after seeing some data is proportional to the number of ways this hypothesis can "produce" the data, multiplied by its *a priori* probability.

`$$\Pr(\text{hypothesis}\ |\ \text{data}) \propto \Pr(\text{data}\ |\ \text{hypothesis}) \times \Pr(\text{hypothesis})$$`
--

From there, we construct proper probabilities by standardising these numbers so that their sum is equal to 1.

$$
\Pr(\text{hypothesis}\ |\ \text{data}) = \frac{\Pr(\text{data}\ |\ \text{hypothesis})\times \Pr(\text{hypothesis})}{\text{sum of products}}
$$

# Notations, terminology

- `\(\color{orangered}{p(x\vert \theta)}\)`&lt;span style="color:orangered"&gt;: the conditional probability of the data `\(x\)` given `\(\theta\)` `\(\color{orangered}{[p(x | \theta = \theta)]}\)`.

- `\(\color{orangered}{p(x\vert \theta)}\)`&lt;span style="color:orangered"&gt;: once we know `\(x\)`, can be seen as the likelihood function of `\(\theta\)`. Note that this is *not* a probability distribution `\(\color{orangered}{[p(x = x | \theta)]}\)`.&lt;/span&gt;

- `\(\color{steelblue}{p(\theta)}\)`&lt;span style="color:steelblue"&gt;: the prior probability of `\(\theta\)`.&lt;/span&gt;

- `\(\color{purple}{p(\theta \vert x)}\)`&lt;span style="color:purple"&gt;: the posterior probability of `\(\theta\)` (given `\(x\)`).&lt;/span&gt;

- `\(\color{green}{p(x)}\)`&lt;span style="color:green"&gt;: the marginal probability of `\(x\)` (over `\(\theta\)`).&lt;/span&gt;

&lt;br&gt;

`$$\color{purple}{p(\theta \vert x)} = \dfrac{\color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}}{\color{green}{p(x)}} = \dfrac{\color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}}{\color{green}{\sum\limits_{\theta}p(x|\theta)p(\theta)}} = \dfrac{\color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}}{\color{green}{\int\limits_{\theta}p(x|\theta)p(\theta)\mathrm{d}x}} \propto \color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}$$`

# Probability axioms (Kolmogorov, 1933)

A probability is **a numerical value** assigned to an event `\(A\)`, this event being a possibility of an ensemble `\(\Omega\)` (the ensemble of all possible events). Probabilities conform to the following axioms (the third axiom is only valid for mutually exclusive events):

+ **Non-negativity:** `\(\Pr(A) \geq 0\)`
+ **Normalisation:** `\(\Pr(\Omega) = 1\)`
+ **Additivity (for mutually exclusive events):** `\(\Pr(A_{1} \cup A_{2}) = \Pr(A_{1}) + \Pr(A_{2})\)`

This last axiom is also known as the **sum rule**, and can be generalised to non mutually exclusive events: `\(\Pr(A_{1} \cup A_{2}) = \Pr(A_{1}) + \Pr(A_{2}) - \Pr(A_{1} \cap A_{2})\)`.

---

# Deriving Bayes theorem

From these axioms (and the definitions of joint, marginal, and conditional probability) derives the **product rule**, which states that:

`$$p(x,y) = p(x|y)p(y) = p(y|x)p(x)$$`
--

Then, restating the above equality,

`$$p(y|x)p(x) = p(x|y)p(y)$$`

--

And dividing each side by `\(p(x)\)` gives Bayes theorem, which can be written as:

`$$p(y|x) = \dfrac{p(x|y)p(y)}{p(x)}$$`

--

Or, in plain English (replacing `\(x\)` by *data* and `\(y\)` by *hypothesis*):

$$
\Pr(\text{hypothesis}\ |\ \text{data}) = \frac{\Pr(\text{data}\ |\ \text{hypothesis})\times \Pr(\text{hypothesis})}{\text{sum of products}}
$$
---

# Bayesian inference

For each statistical problem, we follow three steps (from [Gelman et al., 2013](http://www.stat.columbia.edu/~gelman/book/)):

1. Building the model (the history of the data): likelihood + priors

--

2. Updating the model with the information contained in the data using Bayes theorem (aka computing or approximating the posterior distribution)

--

3. Evaluating the model, its fit, its assumptions, summarising the results, readjusting the model

---

# The problem with posteriors

Relatively simple problems like estimating the mean `\(\mu\)` and standard deviation `\(\sigma\)` of a Normal distribution with conjugate Gaussian priors have a closed form solution:

`$$\color{purple}{p(\mu, \sigma | x)} = \frac{\prod_{i} \color{orangered}{\mathrm{Normal}(x_{i}|\mu, \sigma)}\color{steelblue}{\mathrm{Normal}(\mu|0,10)\mathrm{Uniform}(\sigma|0,50)}}
{\color{green}{\int \int \prod_{i} \mathrm{Normal}(x_{i}|\mu,\sigma)\mathrm{Normal}(\mu|0,10)\mathrm{Uniform}(\sigma|0,50)d\mu d\sigma}}$$`

`$$\color{purple}{p(\mu, \sigma | x)} \propto \prod_{i} \color{orangered}{\mathrm{Normal}(x_{i}|\mu, \sigma)}\color{steelblue}{\mathrm{Normal}(\mu|0,10)\mathrm{Uniform}(\sigma|0,50)}$$`

--

However, for models containing more parameters or featuring non-conjugate priors, the integral (the **marginalising constant** in green) may be very difficult or impossible to compute.

---

# Sampling the unknowns

Instead of computing the marginalising constant, we will **approximate** the shape of the posterior distribution. Different methods exist...

--

* Grid sampling: computing the exact value of the posterior probability in a finite number of points (can be computationaly very expensive)

--

* Sampling from the distribution using Markov Chain Monte-Carlo algorithms (much more efficient than grid approximation)...

# Theoretical background - Multilevel linear models

---

# Linear models

The following is an excerpt from this [blogpost](https://www.barelysignificant.com/post/glm/): "*Using R to make sense of the generalised linear model*".

&gt; "[Statistical] models are devices that connect theories to data. A model is an instanciation of a theory as a set of probabilistic statements" ([Rouder, Morey, &amp; Wagenmakers, 2016](https://www.collabra.org/articles/10.1525/collabra.28/)).

--

The usual linear model is of the following form.

$$
`\begin{aligned}
y_{i} &amp;\sim \mathrm{Normal}(\mu_{i}, \sigma) \\
\mu_{i} &amp;= \alpha + \beta \cdot x_{i} \\
\end{aligned}`
$$

Where the first line describes the assumption made about the process that generated the data. We make the assumption that the outcomes `\(y_{i}\)` are normally distributed around a mean `\(\mu_{i}\)` with some error `\(\sigma\)`. This is equivalent to say that the errors are normally distributed around `\(0\)`.

---

# Linear models

Below, we illustrate a simple Gaussian linear model using the `Howell1` dataset from the `rethinking` package ([McElreath, 2016](https://github.com/rmcelreath/rethinking)), which contains data about 544 individuals, including height (centimetres), weight (kilograms), age (years) and gender (0 indicating female and 1 indicating male).

&lt;img src="brown_bag_meeting_2022_files/figure-html/howell-1.svg" width="66%" style="display: block; margin: auto;" /&gt;

---

# Linear models

A quick visual exploration of the dataset reveals a positive relationship between height and weight. The previously plotted regression line corresponds to the following model, where we assume a Gaussian likelihood function:

$$
`\begin{aligned}
\text{height}_{i} &amp;\sim \mathrm{Normal}(\mu_{i}, \sigma) \\
\mu_{i} &amp;= \alpha + \beta \cdot \text{weight}_{i} \\
\end{aligned}`
$$

--

This model can be fitted easily in `R` using the `lm()` function and the following syntax.


```r
(mod1 &lt;- lm(height ~ weight, data = d) )
```

```
## 
## Call:
## lm(formula = height ~ weight, data = d)
## 
## Coefficients:
## (Intercept)       weight  
##     113.879        0.905
```

---

# Generalised linear model

Of course, the distributional assumption is not restricted to be Gaussian, and can be adapted to whatever distribution makes sense in consideration of the data at hand. Generalising to other distributions, the generalised linear model can be rewritten as:

$$
`\begin{aligned}
y_{i} &amp;\sim \mathrm{D}(f(\eta_{i}), \theta) \\
\eta &amp;= \mathbf{X} \beta \\
\end{aligned}`
$$

Where the response `\(y_{i}\)` is **predicted** through the linear combination `\(\eta\)` of predictors transformed by the inverse link function `\(f\)`, assuming a certain distribution `\(D\)` for `\(y\)` (also called the *family*), and family-specific parameters `\(\theta\)` ([Bürkner, 2017](https://www.jstatsoft.org/article/view/v080i01)).

---

# Multilevel modelling

Multilevel models are multi-level generalisations of linear models.

$$
`\begin{align}
\text{Level 1}: y_{i} &amp;\sim \mathrm{Normal}(\mu_{i},\sigma) \\
\mu_{i} &amp;= \alpha_{\text{group}[i]} + \beta \cdot x_{i} \\
\text{Level 2}: \alpha_{\text{group}} &amp;\sim \mathrm{Normal}(\alpha,\sigma_{\text{group}}) \\
\end{align}`
$$

The "prior" on the by-group intercepts `\(\alpha_{\text{group}}\)` is a function of two parameters `\(\alpha\)` and `\(\sigma_{\text{group}}\)`. These parameters are called **hyper-parameters**, as they are parameters for parameters. There are two levels in the model...

# Shrinkage magic (Efron &amp; Morris, 1977)

&lt;img src="figures/stein1.png" width="66%" style="display: block; margin: auto;" /&gt;

The James-Stein estimator is defined as `\(z = \bar{y} + c(y - \bar{y})\)`, where `\(\bar{y}\)` is the grand average, `\(y\)` an individual estimation and `\(c\)` a constant, the "shrinking factor" ([Efron &amp; Morris, 1977](http://statweb.stanford.edu/~ckirby/brad/other/Article1977.pdf)).

---

# Shrinkage magic (Efron &amp; Morris, 1977)

The James-Stein estimator is determined both by the variability in the measure (e.g., its standard deviation, influencing the shrinking factor `\(c\)`) and by its distance to the average estimation (i.e., `\(y - \bar{y}\)`). In other words, extreme observations are trusted less. Shrinkage therefore acts as **a safeguard against overfitting** in multilevel models.

# Under the hood: Stan

`Stan` is a probabilistic programming language written in `C++`. It implements several MCMC algorithms such as HMC, NUTS, L-BFGS...


```r
data {
  int&lt;lower=0&gt; J; // number of schools 
  real y[J]; // estimated treatment effects
  real&lt;lower=0&gt; sigma[J]; // s.e. of effect estimates 
}

parameters {
  real mu; 
  real&lt;lower=0&gt; tau;
  real eta[J];
}

transformed parameters {
  real theta[J];
  for (j in 1:J)
    theta[j] = mu + tau * eta[j];
}

model {
  target += normal_lpdf(eta | 0, 1);
  target += normal_lpdf(y | theta, sigma);
}
```

---

# Bayesian Regression Models using Stan

The `brms` package ([Bürkner, 2017](https://www.jstatsoft.org/article/view/v080i01)) allows fitting complex Bayesian multilevel linear and non-linear models in `Stan` using an intuitive high-level syntax (similar to the syntax of `lme4`). For instance, the following model:

$$
`\begin{align}
y_{i} &amp;\sim \mathrm{Normal}(\mu_{i}, \sigma) \\
\mu_{i} &amp;= \alpha + \alpha_{subject[i]} + \alpha_{item[i]} + \beta \cdot x_{i} \\
\end{align}`
$$

can be fitted using `brms` (as with `lme4`) as follows:


```r
brm(y ~ x + (1|subject) + (1|item), data = d, family = gaussian() )
```

# Some elements of syntax

The `brms` package features the same syntax as base R functions such as `lm()` or functions from the `lme4` package.


```r
Reaction ~ Days + (1 + Days | Subject)
```

--

The left-hand side of the formula defines the *outcome* (i.e., what is predicted). The `brms` package also allows fitting multivariate (i.e., with several outcomes) models by combining these outcomes with `mvbind()`:


```r
mvbind(Reaction, Memory) ~ Days + (1 + Days | Subject)
```

--

The right-hand side of the formula defines the *predictors* (i.e., what is used to predict the outcome.s). Note that an intercept is implicitly assumed by default in `R`, so that the two notations below correspond to the same model.


```r
mvbind(Reaction, Memory) ~ Days + (1 + Days | Subject)
mvbind(Reaction, Memory) ~ 1 + Days + (1 + Days | Subject)
```

---

# Some elements of syntax

To fit a model without an intercept (because we can), we need to explicitly specify it as follows.


```r
mvbind(Reaction, Memory) ~ 0 + Days + (1 + Days | Subject)
```

--

The first part of the right-hand side of the formula corresponds to *constant effects* (aka *fixed effects*), whereas the second part (inside parentheses) corresponds to *varying effects* (aka *random effects*).


```r
mvbind(Reaction, Memory) ~ Days + (1 | Subject)
mvbind(Reaction, Memory) ~ Days + (Days | Subject)
```

The first above model contains an intercept varying by `Subject`. The second model contains in addition a slope varying by `Subject`.

---

# Some elements of syntax

When we include several varying effects (e.g., both a varying intercept and a varying slope), `brms` estimates the correlation between each pair of varying effects by default. If we are not interested in estimating this correlation, we need to remove this parameter from the model (that is equivalent to fixing its value to 0) by using `||`.


```r
mvbind(Reaction, Memory) ~ Days + (1 + Days || Subject)
```

--

The previous models assumed a Gaussian response distribution. We can change this assumption by using the `family` argument.


```r
brm(Reaction ~ 1 + Days + (1 + Days | Subject), family = lognormal() )
```

# Worked example #1 - Experimental absenteeism

Working with human subjects requires a minimum amount of reciprocal cooperation. But that requirement is not always fulfilled. A non-negligible proportion of students that register for a Psychology experiment in our lab do not show up for the experiment... We wanted to estimate the probability that a registered participant would come to the lab, depending on whether s•he received a reminder by email (this example is presented in more depth in two blogposts, available [here](http://www.barelysignificant.com/post/absenteeism/) and [there](http://www.barelysignificant.com/post/absenteeism2/)).


```r
library(tidyverse)

data &lt;- read.csv("data/absenteeism.csv")
data %&gt;% sample_frac %&gt;% head(10)
```

```
##    reminder researcher presence absence total
## 1         1          3       87       9    96
## 2         1          8       81      11    92
## 3         1          4       92       3    95
## 4         1          1       96       6   102
## 5        -1          1       16      86   102
## 6        -1          4       61      34    95
## 7        -1          3       31      65    96
## 8        -1          5       34      49    83
## 9        -1         10       23      58    81
## 10        1          9       89       7    96
```

---

# Worked example #1 - Experimental absenteeism

In other words, we want to estimate the probability of the participant being present. We assume `\(y_{i}\)` (i.e., the number of participants being present, out of `\(n_{i}\)` participants) to be binomially distributed with probability of being present `\(p_{i}\)`.

`$$y_{i} \sim \mathrm{Binomial}(n_{i}, p_{i})$$`

--

The log-odds `\(\text{logit}(p_{i})\)` are predicted via a linear combination of some parameters:

`$$\text{logit}(p_{i}) = \log \left(\frac{p_{i}}{1-p_{i}}\right) = \alpha + \beta \times \text{reminder}_{i}$$`

Where `\(\text{logit}(\cdot)\)` is a **link function**, relating the bounded scale of the parameter (i.e., `\(0 \leq p \leq 1\)`) to the unbounded scale of the predictors.

---

# Worked example #1 - Experimental absenteeism

We can extend this model on several levels, allowing the average log-odds (i.e., the intercept) and the effect of the reminder (i.e., the slope) to vary by researcher.

&lt;img src="figures/logit.png" width="50%" style="display: block; margin: auto;" /&gt;

&lt;!--

`$$\begin{aligned}
y_{i} &amp;\sim \mathrm{Binomial}(n_{i}, p_{i}) \\
\text{logit}(p_{i}) &amp;= \alpha_{researcher_{[i]}} + \beta_{researcher_{[i]}} \times \text{reminder}_{i} \\
`\begin{bmatrix}
\alpha_{\text{researcher}} \\
\beta_{\text{researcher}} \\
\end{bmatrix}`
&amp;\sim \mathrm{MVNormal}\bigg(\begin{bmatrix} \alpha \\ \beta \end{bmatrix}, \textbf{S}\bigg) \\
\textbf{S} &amp;=
`\begin{pmatrix}
\sigma_{\alpha} &amp; 0 \\
0 &amp; \sigma_{\beta} \\
\end{pmatrix}`
\textbf{R} \begin{pmatrix}
\sigma_{\alpha} &amp; 0 \\
0 &amp; \sigma_{\beta} \\
\end{pmatrix} \\
\alpha &amp;\sim \mathrm{Normal}(0, 10) \\
\beta &amp;\sim \mathrm{Normal}(0, 10) \\
(\sigma_{\alpha}, \sigma_{\beta}) &amp;\sim \mathrm{HalfCauchy}(0, 10) \\
\textbf{R} &amp;\sim \mathrm{LKJcorr}(2) \\
\end{aligned}$$`

--&gt;

These estimations are in the log-odds scale... To interpret them more easily, we need to apply the inverse link function (i.e., the logit-inverse). For instance, the average probability of presence (i.e., whatever the researcher or the reminder status) is given by `\(p = \exp(\alpha) / (1 + \exp(\alpha) )\)`.

# Worked example #1 - Experimental absenteeism

Then, we assessed the effect of the reminder email. Here again, it is difficult to interpret the raw estimates... but we know that `\(\text{exp}(\beta)\)` gives an [odds ratio](https://en.wikipedia.org/wiki/Odds_ratio).


```r
fixef(mod2)[2, c(1, 3, 4)] %&gt;% exp
```

```
## Estimate     Q2.5    Q97.5 
## 5.002264 3.542210 7.171487
```

We can interpret this ratio (OR = 4.99, 95% HDI [3.51, 7.19]) by saying that sending a reminder email multiplies by 5 the **odds** that the participant will be present.

# Hypothesis test - 1

The `brms` package offers several ways of testing hypotheses. The `hypothesis()` function computes an *evidence ratio* (equivalent to a Bayes factor for point hypotheses, such as `\(\theta = 0\)`). When testing point hypotheses, this evidence ratio is computed using the **Savage-Dickey** method.


```r
(hyp1 &lt;- hypothesis(mod2, "reminder = 0") ) # computing the BF01
```

```
## Hypothesis Tests for class b:
##       Hypothesis Estimate Est.Error CI.Lower CI.Upper Evid.Ratio Post.Prob Star
## 1 (reminder) = 0     1.61      0.18     1.26     1.97          0         0    *
## ---
## 'CI': 90%-CI for one-sided and 95%-CI for two-sided hypotheses.
## '*': For one-sided hypotheses, the posterior probability exceeds 95%;
## for two-sided hypotheses, the value tested against lies outside the 95%-CI.
## Posterior probabilities of point hypotheses assume equal prior probabilities.
```

```r
1 / hyp1$hypothesis$Evid.Ratio # taking the reciprocal of the BF01 (BF10 = 1 / BF01)

# Hypothesis test - 2

We can also follow the **model comparison** approach. Testing the hypothesis of `\(\theta = 0\)` is equivalent to comparing two nested models: a model including the effect of interest and a model without this effect.


```r
prior3 &lt;- c(
    prior(normal(0, 10), class = Intercept, coef = ""),
    prior(cauchy(0, 10), class = sd),
    prior(lkj(2), class = cor) )

mod2 &lt;- brm(presence | trials(total) ~ 1 + reminder + (1 + reminder|researcher), 
    family = binomial(link = "logit"),
    prior = prior2,
    data = data,
    # this line is important for bridgesampling
    save_all_pars = TRUE,
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(),
    control = list(adapt_delta = 0.95) )

mod3 &lt;- brm(presence | trials(total) ~ 1 + (1 + reminder|researcher), 
    family = binomial(link = "logit"),
    prior = prior3,
    data = data,
    save_all_pars = TRUE,
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(),
    control = list(adapt_delta = 0.95) )
```

# Hypothesis test - 2

We can then compare the marginal likelihood of these two models (i.e., compute a Bayes factor). The `brms` package offers the `bayes_factor()` method, which relies on an approximation of the marginal likelihood through `bridgesampling` ([Gronau &amp; Singmann, 2017](https://arxiv.org/abs/1710.08162)).


```r
bayes_factor(mod2, mod3)

# Posterior predictive checking

Another important tool to assess the predictive abilities of the model is known as *posterior predictive checking* (PPC). The idea is simple: we compare the observed data to data generated from the posterior distribution. Once we have a posterior distribution on `\(\theta\)`, we can generate data from the *posterior predictive distribution*:

`$$p(\widetilde{y} | y) = \int p(\widetilde{y} | \theta) p(\theta | y) d \theta$$`

If a model is a good model, it should be able to generate data that looks like the observed data (e.g., [Gabry, Simpson, Vehtari, Betancourt, &amp; Gelman, 2017](https://arxiv.org/abs/1709.01449)). In some sense, posterior predictive checking can be seen as a generalisation of the NHST logic.

# Adjusting Stan's behaviour

When fitting more complex models, you will probably face warning messages such as "`There were x divergent transitions after warmup`". You can adjust `Stan`'s behaviour inside the `brm()` call via the `control` argument.


```r
mod2 &lt;- brm(
    presence | trials(total) ~ 1 + reminder + (1 + reminder|researcher), 
    family = binomial(link = "logit"),
    prior = prior2,
    data = data,
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(), # using all availables cores
    control = list(adapt_delta = 0.95) # adjusting the delta step size
    )
```

For instance, we can increase the step of the algorithm via `adapt_delta` (fixed to 0.8 by default). This will probably slow down the sampling but will also improve the "quality" of the obtained samples. More generally, pay attention to warnings and messages from `brms` as they are usually quite informative and useful.

# Worked example #2 - Meta-analysis

A meta-analysis is an analysis of analyses. It is (or can be) a linear model similar to those discussed previously, except that observations are (usually) already summarised by an effect size. We can treat these effect sizes as observations with a known variation (i.e., estimated and reported in the original articles included in the meta-analysis).

There are two main types of meta-analysis models:

- **Constant-effect (aka fixed-effect) meta-analysis**: We consider that the effect size estimated in each study refers to the same population effect size.

--

- **Varying-effect (aka random effect) meta-analysis**: We model the variability between studies and we exploit the similarities in extent groups (e.g., experiments from the same study or team) to improve the estimation of the overall effect (cf. the shrinkage magic). Note that a "fixed-effect" model" can be considered as a "random-effect" model with a fixed `\(\tau = 0\)`.

---

# Worked example #2 - Meta-analysis

We can write a first model as follows:

$$
`\begin{aligned}
y_{j} &amp;\sim \mathrm{Normal}(\mu_{j}, \sigma_{j}) \\
\mu_{j} &amp;= \alpha + \alpha_{study[j]} \\
\alpha_{study[j]} &amp;\sim \mathrm{Normal}(0, \tau_{s}) \\
\alpha &amp;\sim \mathrm{Normal}(0, 1) \\
\tau_{s} &amp;\sim \mathrm{HalfCauchy}(0, 1) \\
\end{aligned}`
$$

Where `\(\sigma_{j}^2\)` is the variance of the effect in the `\(j\text{th}\)` study and `\(\alpha\)` is the population effect size. The index `\(\alpha_{study[j]}\)` represents the average effect size in the `\(j\text{th}\)` study. In addition to the sample variance `\(\sigma_{j}^2\)` (which is known), we also estimate the variability of the effect between studies `\(\text{Var}(\alpha_{study}) = \tau_{s}^{2}\)` (level 2).

---

# Worked example #2 - Meta-analysis

The previous model can be extended to more than two levels to take into account the dependency structures existing in the data. Indeed, each individual study (i.e., each published paper) may contain several experiments. We could expect experiments from the same study to be more similar than experiments from different studies...

&lt;img src="figures/meta_structure.png" width="75%" style="display: block; margin: auto;" /&gt;

---

# Worked example #2 - Meta-analysis

We can write this model on three levels, as follows:

$$
`\begin{aligned}
y_{ij} &amp;\sim \mathrm{Normal}(\mu_{ij}, \sigma_{ij}) \\
\mu_{ij} &amp;= \alpha + \alpha_{study[j]} + \alpha_{experiment[ij]} \\
\alpha_{study[j]} &amp;\sim \mathrm{Normal}(0, \tau_{s}) \\
\alpha_{experiment[ij]} &amp;\sim \mathrm{Normal}(0, \tau_{e}) \\
\alpha &amp;\sim \mathrm{Normal}(0, 1) \\
\tau_{e}, \tau_{s} &amp;\sim \mathrm{HalfCauchy}(0, 1) \\
\end{aligned}`
$$

In addition to the residual variability `\(\sigma_{ij}\)`, we also estimate two other sources of variation: the variation of effects between different experiments from the same study `\(\text{Var}(\alpha_{experiment}) = \tau_{e}^{2}\)` (level 2) and the variation of the effect between different studies `\(\text{Var}(\alpha_{study}) = \tau_{s}^{2}\)` (level 3).

---

# Worked example #2 - Meta-analysis

This model is easily fitted with `brms`.


```r
prior4 &lt;- c(
    prior(normal(0, 1), coef = intercept),
    prior(cauchy(0, 1), class = sd)
    )

mod4 &lt;- brm(
    yi | se(sqrt(vi) ) ~ 0 + intercept + (1|study) + (1|experiment),
    data = d,
    prior = prior4,
    save_all_pars = TRUE,
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(),
    control = list(adapt_delta = .99)
    )
```

# Take-home messages

* **Bayesian inference**: A general statistical inference framework relying on the use of Bayes theorem (i.e., basic probability rules). Can be seen as an extension of logic, where conclusions are derived from premises (prior information) and evidence (information contained in the data).

--

* **Multilevel models**: Hierarchical (or not) extensions of the linear model taking into account complex data structures to provide more precise estimations via partial pooling (cf. the concept of *shrinkage*).

--

* **The brms package**: Bayesian equivalent of `lme4` (but way more flexible), providing an interface to the probabilistic language `Stan`. Allows fitting complex linear and non-linear multilevel models.

--
