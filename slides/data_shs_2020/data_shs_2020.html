# Contexte théorique - Interprétations du concept de probabilité

---

# Axiomes des probabilités (Kolmogorov, 1933)

Une probabilité est une valeur numérique assignée à un événement `\(A\)`, compris comme une possibilité appartenant à l'univers `\(\Omega\)` (l'ensemble de toutes les issues possibles). Les probabilités se conforment aux axiomes suivants :

--
+ **Non-negativity :** `\(\Pr(A) \geq 0\)`
+ **Normalisation :** `\(\Pr(\Omega) = 1\)`
+ **Additivity (pour des événements incompatibles) :** `\(\Pr(A_{1} \cup A_{2}) = \Pr(A_{1}) + \Pr(A_{2})\)`

--

Le dernier axiome est également connu comme la **règle de la somme**, et peut se généraliser à des événements non mutuellement exclusifs : `\(\Pr(A_{1} \cup A_{2}) = \Pr(A_{1}) + \Pr(A_{2}) - \Pr(A_{1} \cap A_{2})\)`.

---

# Interprétations probabilistes

Quelle est la probabilité...

+ D'obtenir un chiffre pair sur un lancer de dé ?
+ Que j'apprenne quelque chose pendant cette formation ?

--

Est-ce qu'il s'agit, pour chaque exemple, de la même **sorte** de probabilité ?

&lt;img src="figures/thinking.gif" width="50%" style="display: block; margin: auto;" /&gt;

---

# Interprétation classique (ou théorique)

$$
\Pr(\text{pair}) = \frac{\text{nombre de cas favorables}}{\text{nombre de cas possibles}} = \frac{3}{6} = \frac{1}{2}
$$

Problème : cette définition est uniquement applicable aux situations dans lesquelles il n'y a qu'un nombre **fini** de résultats possibles **équiprobables**...

--

Quelle est la probabilité qu'il pleuve demain ?

`$$\Pr(\text{pluie}) = \frac{\text{pluie}}{ \{ \text{pluie, non-pluie} \} } = \frac{1}{2}$$`

---

# Interprétation fréquentiste (ou empirique)

`$$\Pr(x) = \lim_{n_{t} \to \infty}\frac{n_{x}}{n_{t}}$$`

Où `\(n_{x}\)` est le nombre d'occurrences de l’événement `\(x\)` et `\(n_{t}\)` le nombre total d'essais. L'interprétation **fréquentiste** postule que, à long-terme (i.e., quand le nombre d'essais s'approche de l'infini), la fréquence relative va converger *exactement* vers ce qu'on appelle "probabilité".

--

Conséquence : le concept de probabilité s'applique uniquement aux **collectifs**, et non aux événements singuliers.

---

# Interprétation fréquentiste (ou empirique)


```r
library(tidyverse)

*sample(c(0, 1), 500, replace = TRUE) %&gt;%
        data.frame %&gt;%
        mutate(x = seq_along(.), y = cumsum(.) / seq_along(.) ) %&gt;%
        ggplot(aes(x = x, y = y), log = "y") +
        geom_line(lwd = 1) +
        geom_hline(yintercept = 0.5, lty = 3) +
        labs(x = "Nombre de lancers", y = "Proportion de faces") +
        ylim(0, 1) + theme_bw(base_size = 20)
```

# Limites de l'interprétation fréquentiste...

Quelle classe de référence ? *Quelle est la probabilité que je vive jusqu'à 80 ans ? En tant qu'homme ? En tant que Français ?*

--

Quid des événements qui ne peuvent pas se répéter ? *Quelle est la probabilité que j'apprenne quelque chose pendant cette formation ?*

--

À partir de combien de lancers (d'une pièce par exemple) a-t-on une bonne approximation de la probabilité ? Une classe finie d’événements de taille `\(n\)` ne peut produire que des fréquences relatives de précision `\(1/n\)`...

# Interprétation logique

L'interprétation logique du concept de probabilité essaye de généraliser la logique (vrai / faux) au monde probabiliste. La probabilité représente donc le *degré de support logique* qu'une conclusion peut avoir, relativement à un ensemble de prémisses ([Keynes, 1921](https://archive.org/details/treatiseonprobab007528mbp); [Carnap, 1950](http://fitelson.org/confirmation/carnap_logical_foundations_of_probability.pdf)).

--

Conséquence : toute probabilité est **conditionnelle**.

---

# Interprétation bayésienne

**La probabilité est une mesure du degré d'incertitude**. Un événement *certain* aura donc une probabilité de 1 et un événement *impossible* aura une probabilité de 0.

--

Pour parler de probabilités, dans ce cadre, nous n'avons donc plus besoin de nous référer à la limite d'occurrence d'un événement (fréquence).

--

&gt; *So to assign equal probabilities to two events is not in any way an assertion that they must occur equally often in any random experiment [...], it is only a formal way of saying I don’t know* ([Jaynes, 1986](http://bayes.wustl.edu/etj/articles/general.background.pdf)).

---

# Interprétations probabilistes

+ Interprétation classique (Laplace, Bernouilli, Leibniz)
+ **Interprétation fréquentiste** (Venn, Reichenbach, von Mises)
+ Interprétation propensionniste (Popper, Miller)
+ Interprétation logique (Keynes, Carnap)
+ **Interprétation bayésienne** (Jeffreys, de Finetti, Savage)

*[Plus de détails sur la Stanford Encyclopedia of Philosophy...](http://plato.stanford.edu/entries/probability-interpret/)*

---

# Interprétations probabilistes - résumé

**Probabilité épistémique**
- Toute probabilité est conditionnelle à de l'information disponible (e.g., prémisses ou données)
- La probabilité comme moyen de quantifier l'incertitude
- Probabilité logique, probabilité bayésienne

--

**Probabilité physique**
- Les probabilités dépendent d'un état du monde, de caractéristiques physiques, elles sont indépendantes de l'information disponible (ou de l'incertitude)
- Probabilité classique, probabilité fréquentiste &lt;/center&gt;

# Accumulation d'évidence

Dans le cas précédent, nous avons considéré que toutes les hypothèses étaient équiprobables a priori (suivant le [principe d'indifférence](https://en.wikipedia.org/wiki/Principle_of_indifference)).

--

Cependant, on pourrait avoir de l'information a priori, provenant de nos connaissances (des particularités des sacs de billes par exemple) ou de données antérieures.

--

Imaginons que nous tirions une nouvelle bille du sac, comment incorporer cette nouvelle donnée ?

---

# Accumulation d'évidence

Il suffit d'appliquer la même stratégie que précédemment, et de mettre à jour le dernier compte en le multipliant par ces nouvelles données. *Yesterday's posterior is today's prior* ([Lindley, 2000](https://rss.onlinelibrary.wiley.com/doi/abs/10.1111/1467-9884.00238)).

# Des énumérations aux probabilités

La probabilité d'une hypothèse après avoir observé certaines données est proportionnelle au nombre de façons qu'a cette hypothèse de produire les données observées, multiplié par sa probabilité a priori.

$$
\Pr(\text{hypothèse}\ |\ \text{données}) \propto \Pr(\text{données}\ |\ \text{hypothèse}) \times \Pr(\text{hypothèse})
$$

--

Pour calculer la probabilité d'une hypothèse, il suffit de standardiser ce produit (i.e., nombre de façons de produire les données multiplié par la probabilité a priori de l'hypothèse) de manière à ce que la somme des probabilités de toutes les hypothèses possibles soit égale à `\(1\)`.

$$
\Pr(\text{hypothèse}\ |\ \text{données}) = \frac{\Pr(\text{données}\ |\ \text{hypothèse})\times \Pr(\text{hypothèse})}{\text{somme des produits}}
$$

---

# Notations, terminologie


- `\(\theta\)` est un paramètre ou vecteur de paramètres (e.g., la proportion de billes bleues).
- `\(\color{orangered}{p(x\vert \theta)}\)` &lt;span style="color:orangered"&gt; la probabilité conditionnelle des données `\(x\)` sachant le paramètre `\(\theta\)` `\(\color{orangered}{[p(x | \theta = \theta)]}\)`. &lt;/span&gt;
- `\(\color{orangered}{p(x\vert \theta)}\)` &lt;span style="color:orangered"&gt; une fois que la valeur de `\(x\)` est connue, est vue comme la fonction de vraisemblance (*likelihood*) du paramètre `\(\theta\)`. Attention, il ne s'agit pas d'une distribution de probabilité `\(\color{orangered}{[p(x = x | \theta)]}\)`. &lt;/span&gt;
- `\(\color{steelblue}{p(\theta)}\)` &lt;span style="color:steelblue"&gt; la probabilité a priori de `\(\theta\)`.&lt;/span&gt;
- `\(\color{purple}{p(\theta \vert x)}\)` &lt;span style="color:purple"&gt; la probabilité a posteriori de `\(\theta\)` (sachant `\(x\)`).&lt;/span&gt;
- `\(\color{green}{p(x)}\)` &lt;span style="color:green"&gt; la probabilité marginale de `\(x\)` (sur `\(\theta\)`) ou "vraisemblance marginale", "vraisemblance intégrée".&lt;/span&gt;

&lt;br&gt;

`$$\color{purple}{p(\theta \vert x)} = \dfrac{\color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}}{\color{green}{p(x)}} = \dfrac{\color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}}{\color{green}{\sum\limits_{\theta}p(x|\theta)p(\theta)}} = \dfrac{\color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}}{\color{green}{\int\limits_{\theta}p(x|\theta)p(\theta)\mathrm{d}x}} \propto \color{orangered}{p(x\vert \theta)} \color{steelblue}{p(\theta)}$$`
---

# Inférence bayésienne

Dans ce cadre, pour chaque problème, nous allons suivre 3 étapes (from [Gelman et al., 2013](http://www.stat.columbia.edu/~gelman/book/)) :

--

- Construire le modèle (l'histoire des données): *likelihood* + *prior*

--

- Mettre à jour grâce aux données (*updating*), calculer la probabilité *a posteriori*

--

- Evaluer le modèle, *fit*, sensibilité, résumer les résultats, ré-ajuster

# Aparté, qu'est-ce qu'une intégrale ?

Une intégrale correspond à la **surface** (aire géométrique) délimitée par la représentation graphique d'une fonction, *l'aire sous la courbe*. Une distribution est dite **impropre** si son intégrale n'est pas égale à un nombre fini (e.g., `\(+ \infty\)`) et **normalisée** si son intégrale est égale à 1.

# Probabilité conditionnelle, règle du produit

On remarque dans le cas précédent que `\(p(blonds|bleus)\)` **n'est pas nécessairement égal** à `\(p(bleus|blonds)\)`.

--

&lt;iframe
align="right" border=0 frameborder=0 height=400 width=600
src="https://twitframe.com/show?url=https://twitter.com/BillGates/status/1118196606975787008"&gt;
&lt;/iframe&gt;

Autre exemple : la probabilité de mourir sachant qu'on a été attaqué par un requin n'est pas la même que la probabilité d'avoir été attaqué par un requin, sachant qu'on est mort ([*confusion of the inverse*](https://en.wikipedia.org/wiki/Confusion_of_the_inverse)). De la même manière, `\(p(data|H_{0}) \neq p(H_{0}|data)\)`.

--

À partir des axiomes de Kolmogorov (cf. début du cours), et des définitions précédentes des probabilités conjointes, marginales, et conditionnelles, découle la **règle du produit** :

`$$p(a, b) = p(b) \times p(a|b) = p(a) \times p(b|a)$$`

---

# Dérivation du théorème de Bayes

`$$p(x,y) = p(x|y) \times p(y) = p(y|x) \times p(x)$$`

--

`$$p(y|x) \times p(x) = p(x|y) \times p(y)$$`

--

`$$p(y|x) = \dfrac{p(x|y) \times p(y)}{p(x)}$$`

--

`$$p(x|y) = \dfrac{p(y|x) \times p(x)}{p(y)}$$`

--

`$$\Pr(\text{hypothèse}\ |\ \text{données}) = \frac{\Pr(\text{données}\ |\ \text{hypothèse})\times \Pr(\text{hypothèse})}{\text{somme des produits}}$$`

# D'où vient la loi normale ?

Certaines valeurs sont fortement probables (autour de la moyenne `\(\mu\)`). Plus on s'éloigne, moins les valeurs sont probables (en suivant une décroissance exponentielle).

&lt;img src="data_shs_2020_files/figure-html/normal-explain1-1.svg" width="75%" style="display: block; margin: auto;" /&gt;

---

# D'où vient la loi normale ?

`$$y = \exp \left[-x^{2} \right]$$`

On étend notre fonction aux valeurs négatives.

&lt;img src="data_shs_2020_files/figure-html/normal-explain2-1.svg" width="75%" style="display: block; margin: auto;" /&gt;

---

# D'où vient la loi normale ?

`$$y = \exp \left[-x^{2} \right]$$`

Les points d'inflection nous donnent une bonne indication de là où la plupart des valeurs se trouvent (i.e., entre les points d'inflection). Les pics de la dérivée nous montrent les points d'inflection.

&lt;img src="data_shs_2020_files/figure-html/normal-explain3-1.svg" width="75%" style="display: block; margin: auto;" /&gt;

---

# D'où vient la loi normale ?

`$$y = \exp \left [- \frac{1}{2} x^{2} \right]$$`

Ensuite on standardise la distribution de manière à ce que les deux points d'inflection se trouvent à `\(x = -1\)` et `\(x = 1\)`.

&lt;img src="data_shs_2020_files/figure-html/normal-explain4-1.svg" width="75%" style="display: block; margin: auto;" /&gt;

---

# D'où vient la loi normale ?

`$$y = \exp \left[- \frac{1}{2 \color{steelblue}{\sigma^{2}}} x^{2} \right]$$`

On insère un paramètre `\(\sigma^{2}\)` pour contrôler la distance entre les points d'inflection.

&lt;img src="data_shs_2020_files/figure-html/normal-explain5-1.svg" width="75%" style="display: block; margin: auto;" /&gt;

---

# D'où vient la loi normale ?

`$$y = \exp \left[- \frac{1}{2 \color{steelblue}{\sigma^{2}}} (\color{orangered}{\mu} - x)^{2} \right]$$`

On insère ensuite un paramètre `\(\mu\)` afin de pouvoir contrôler la position (la tendance centrale) de la distribution.

&lt;img src="data_shs_2020_files/figure-html/normal-explain6-1.svg" width="75%" style="display: block; margin: auto;" /&gt;

# D'où vient la loi normale ?

`$$y = \frac{1}{\sqrt{2 \pi \color{steelblue}{\sigma^{2}}}} \exp \left[-\frac{1}{2 \color{steelblue}{\sigma^{2}}} (\color{orangered}{\mu} - x)^{2} \right]$$`

Mais... cette distribution n'intègre pas à 1. On divise donc par une constante de normalisation (la partie gauche), afin d'obtenir une distribution de probabilité.

# Modèle gaussien

Nous allons construire un modèle de régression, mais avant d'ajouter un prédicteur, essayons de modéliser la distribution des tailles.

# Fonction de vraisemblance

On veut calculer la probabilité d'observer une certaine valeur de taille, sachant certaines valeurs de `\(\mu\)` et `\(\sigma\)`, c'est à dire :

p(x \ | \ \mu, \sigma) = \frac{1}{\sqrt{2 \pi \sigma^{2}}} \exp \bigg[-\frac{1}{2 \sigma^{2}} (\mu - x)^{2} \bigg]
$$

--

On peut calculer cette *densité de probabilité* à l'aide des fonctions `dnorm`, `dbeta`, `dt`, `dexp`, `dgamma`, etc.

# Fonction de vraisemblance

`$$p(x \ | \ \mu, \sigma) = \frac{1}{\sqrt{2 \pi \sigma^{2}}} \exp \left[-\frac{1}{2 \sigma^{2}} (\mu - x)^{2} \right]$$`

Ou à la main...


```r
normal_likelihood &lt;- function (x, mu, sigma) {
  
  bell &lt;- exp( (- 1 / (2 * sigma^2) ) * (mu - x)^2 )
  norm &lt;- sqrt(2 * pi * sigma^2)
  
  return(bell / norm)
  
}
```

```r
normal_likelihood(df$height[34], mu_exemple, sigma_exemple)

# Distribution postérieure

`$$\color{purple}{p(\mu, \sigma \ | \ h)} = \frac{\prod_{i} \color{orangered}{\mathrm{Normal}(h_{i} \ | \ \mu, \sigma)}\color{steelblue}{\mathrm{Normal}(\mu \ | \ 178, 20)\mathrm{Uniform}(\sigma \ | \ 0, 50)}}
{\color{green}{\int \int \prod_{i} \mathrm{Normal}(h_{i} \ | \ \mu, \sigma)\mathrm{Normal}(\mu \ | \ 178, 20)\mathrm{Uniform}(\sigma \ | \ 0, 50) \mathrm{d} \mu \mathrm{d} \sigma}}$$`

`$$\color{purple}{p(\mu, \sigma \ | \ h)} \propto \prod_{i} \color{orangered}{\mathrm{Normal}(h_{i} \ | \ \mu, \sigma)}\color{steelblue}{\mathrm{Normal}(\mu \ | \ 178, 20)\mathrm{Uniform}(\sigma \ | \ 0, 50)}$$`

Il s'agit de la même formule vue précédemment, mais cette fois en considérant qu'il existe plusieurs observations de taille `\(h_{i}\)`, et deux paramètres à estimer `\(\mu\)` et `\(\sigma\)`.

--

Pour calculer la **vraisemblance marginale** (en vert), il faut donc intégrer sur deux paramètres : `\(\mu\)` et `\(\sigma\)`. On réalise ici encore que la probabilité a posteriori est proportionnelle au produit de la vraisemblance et du prior.

--

Petit problème : `\(p(data)\)` se calcule en calculant la somme (pour des variables discrètes) ou l'intégrale (pour des variables continues) de la densité conjointe `\(p(data, \theta)\)` sur toutes les valeurs possibles de `\(\theta\)`. Cela se complique lorsque le modèle comprend plusieurs paramètres...

# Échantillonner pour décrire une distribution

Pour les modèles plus complexes, on ne va pas calculer explicitement la constante de normalisation.

--

- Pour des modèles simples, on peut utiliser la méthode par grille. On calcule la valeur exacte de la probabilité postérieure en un nombre fini de points dans l'espace des paramètres.

--

- Pour les modèles plus complexes, explorer tout l'espace des paramètres n'est pas tractable. On va plutôt échantillonner **intelligemment** un grand nombre de points dans l'espace des paramètres en utilisant des Markov Chain Monte-Carlo (MCMC).

# Introduction à brms

`Stan` est un langage de programmation probabiliste écrit en `C++`, et qui implémente plusieurs algorithmes de MCMC: HMC, NUTS, L-BFGS...


```r
data {
  int&lt;lower=0&gt; J; // number of schools 
  real y[J]; // estimated treatment effects
  real&lt;lower=0&gt; sigma[J]; // s.e. of effect estimates 
}

parameters {
  real mu; 
  real&lt;lower=0&gt; tau;
  real eta[J];
}

transformed parameters {
  real theta[J];
  for (j in 1:J)
    theta[j] = mu + tau * eta[j];
}

model {
  target += normal_lpdf(eta | 0, 1);
  target += normal_lpdf(y | theta, sigma);
}
```

---

# Bayesian regression models using Stan

Le package `brms` ([Bürkner, 2017](https://www.jstatsoft.org/article/view/v080i01)) permet de fitter des modèles multi-niveaux (ou pas) linéaires (ou pas) bayésiens en `Stan` mais en utilisant la syntaxe de `lme4`.

--

Par exemple, le modèle suivant :

$$
`\begin{align}
y_{i} &amp;\sim \mathrm{Normal}(\mu_{i}, \sigma) \\
\mu_{i} &amp;= \alpha + \alpha_{subject[i]} + \alpha_{item[i]} + \beta x_{i} \\
\end{align}`
$$

--

se spécifie avec `brms` (comme avec `lme4`) de la manière suivante :


```r
brm(y ~ x + (1 | subject) + (1 | item), data = df, family = gaussian() )
```

---

# Rappels de syntaxe

Le package `brms` utilise la même syntaxe que les fonctions de base R (comme `lm`) ou que le package `lme4`.


```r
Reaction ~ Days + (1 + Days | Subject)
```

--

La partie gauche représente notre variable dépendante (ou *outcome*, i.e., ce qu'on essaye de prédire). Le package `brms` permet également de fitter des modèles multivariés (plusieurs outcomes) en les combinant avec `mvbind()`.


```r
mvbind(Reaction, Memory) ~ Days + (1 + Days | Subject)
```

--

La partie droite permet de définir les prédicteurs. L'intercept est généralement implicite, de sorte que les deux écritures ci-dessous sont équivalentes.


```r
mvbind(Reaction, Memory) ~ Days + (1 + Days | Subject)
mvbind(Reaction, Memory) ~ 1 + Days + (1 + Days | Subject)
```

---

# Rappels de syntaxe

Si l'on veut fitter un modèle sans intercept (why not), il faut le spécifier explicitement comme ci-dessous.


```r
mvbind(Reaction, Memory) ~ 0 + Days + (1 + Days | Subject)
```

--

Par défaut `brms` postule une vraisemblance gaussienne. Ce postulat peut être changé facilement en spécifiant la vraisemblance souhaitée via l'argument `family`.


```r
brm(Reaction ~ 1 + Days + (1 + Days | Subject), family = lognormal() )
```

--

Lisez la documentation (c'est très enthousiasmant à lire) accessible via `?brm`.

# Différentes notations

On considère un modèle de régression linéaire avec un seul prédicteur, une pente, un intercept, et des résidus distribués selon une loi normale. La notation :

`$$h_{i} = \alpha + \beta x_{i} + \epsilon_{i} \quad \text{avec} \quad \epsilon_{i} \sim \mathrm{Normal}(0, \sigma)$$`

--

est équivalente à :

`$$h_{i} - (\alpha + \beta x_{i}) \sim \mathrm{Normal}(0, \sigma)$$`

--

et si on réduit encore un peu :

`$$h_{i} \sim \mathrm{Normal}(\alpha + \beta x_{i}, \sigma)$$`

--

Les notations ci-dessus sont équivalentes, mais la dernière est plus flexible, et nous permettra par la suite de l'étendre plus simplement aux modèles multi-niveaux.

---

# Régression linéaire à un prédicteur continu

`$$\begin{aligned}
\color{orangered}{h_{i}} \ &amp;\color{orangered}{\sim \mathrm{Normal}(\mu_{i}, \sigma)} \\
\color{black}{\mu_{i}} \ &amp;\color{black}{= \alpha + \beta x_{i}} \\
\color{steelblue}{\alpha} \ &amp;\color{steelblue}{\sim \mathrm{Normal}(178, 20)} \\
\color{steelblue}{\beta} \ &amp;\color{steelblue}{\sim \mathrm{Normal}(0, 10)} \\
\color{steelblue}{\sigma} \ &amp;\color{steelblue}{\sim \mathrm{Exponential}(0.01)} \\
\end{aligned}$$`

Dans ce modèle `\(\mu\)` n'est plus un paramètre à estimer (car `\(\mu\)` est *déterminé* par `\(\alpha\)` et `\(\beta\)`). À la place, nous allons estimer `\(\alpha\)` et `\(\beta\)`.

--

Rappels : `\(\alpha\)` est l'*intercept*, c'est à dire la taille attendue, lorsque le poids est égal à `\(0\)`. `\(\beta\)` est la pente, c'est à dire le changement de taille attendu quand le poids augmente d'une unité.

---

# Régression linéaire à un prédicteur continu


```r
priors &lt;- c(
  prior(normal(178, 20), class = Intercept),
  prior(normal(0, 10), class = b),
  prior(exponential(0.01), class = sigma)
  )

mod4 &lt;- brm(
  height ~ 1 + weight,
  prior = priors,
  family = gaussian(),
  data = df,
  file = "models/mod4.rds"
  )
```

# Deux types d'incertitude

Deux sources d'incertitude dans le modèle : incertitude concernant l'estimation de la valeur des paramètres mais également concernant le processus d'échantillonnage.

--

**Incertitude épistémique** : La distribution a posteriori ordonne toutes les combinaisons possibles des valeurs des paramètres selon leurs plausibilités relatives.

--

**Incertitude aléatoire** : La distribution des données simulées est elle, une distribution qui contient de l'incertitude liée à un processus d'échantillonnage (i.e., générer des données à partir d'une gaussienne).

Voir aussi ce [court article](http://www.stat.columbia.edu/~gelman/stuff_for_blog/ohagan.pdf) par O'Hagan (2012).

---

# Modèles multi-niveaux (aka modèles à effets mixtes)

Les modèles multi-niveaux sont des généralisations des modèles classiques, sur plusieurs niveaux.

$$
`\begin{align}
\text{Niveau 1}: y_{i} &amp;\sim \mathrm{Normal}(\mu_{i},\sigma) \\
\mu_{i} &amp;= \alpha_{\text{group}[i]} + \beta \cdot x_{i} \\
\text{Niveau 2}: \alpha_{\text{group}} &amp;\sim \mathrm{Normal}(\alpha, \sigma_{\text{group}}) \\
\end{align}`
$$

--

Le "prior" sur les intercepts par groupe `\(\alpha_{\text{group}}\)` est fonction de deux paramètres : `\(\alpha\)` et `\(\sigma_{\text{group}}\)`. Ces paramètres sont aussi appelés **hyper-paramètres**, étant des paramètres pour des paramètres. Il y a plusieurs niveaux dans le modèle...

# Shrinkage magic (Efron &amp; Morris, 1977)

&lt;img src="figures/stein1.png" width="66%" style="display: block; margin: auto;" /&gt;

L'estimateur James-Stein est défini comme `\(z = \bar{y} + c(y - \bar{y})\)`, où `\(\bar{y}\)` est la moyenne de l'échantillon, `\(y\)`  une observation individuelle, et `\(c\)` une constante, le **shrinking factor** ([Efron &amp; Morris, 1977](http://statweb.stanford.edu/~ckirby/brad/other/Article1977.pdf)).

---

# Shrinkage magic (Efron &amp; Morris, 1977)

Le **shrinking factor** est déterminé à la fois par la variabilité (imprécision) de la mesure (e.g., son écart-type) et par la distance à l'estimation moyenne (i.e., `\(y - \bar{y}\)`). En d'autres termes, cet estimateur fait moins "confiance" (i.e., accorde moins de poids) aux observations imprécises et/ou extrêmes. Le **shrinkage** agit donc comme une protection contre le sur-apprentissage (*overfitting*).

&lt;img src="figures/stein2.png" width="75%" style="display: block; margin: auto;" /&gt;

# Modèle linéaire généralisé

On peut généraliser le modèle de régression linéaire en changeant l'hypothèse concernant la distribution de laquelle les données sont issues, en considérant les caractéristiques des données modélisées. On peut remplacer la distribution Gaussienne par n'importe quelle distribution. Le modèle linéaire **généralisé** peut être écrit de la manière suivante :

`$$\begin{aligned}
y_{i} &amp;\sim \mathrm{D}(f(\eta_{i}), \theta) \\
\eta &amp;= \mathbf{X} \beta \\
\end{aligned}$$`

Où la réponse `\(y_{i}\)` est **prédite** par une combinaison linéaire de prédicteurs `\(\eta\)`, transformés par une fonction de lien `\(f\)`, postulant une certaine distribution `\(D\)` pour `\(y\)` (aussi appellée *family*), et des paramètres `\(\theta\)` spécifiques à cette distribution ([Bürkner, 2017](https://www.jstatsoft.org/article/view/v080i01)).

---

# Fonction de lien

Les fonctions de lien  ont pour tâche de mettre en correspondance l'espace d'un modèle linéaire (non borné) avec l'espace d'un paramètre potentiellement borné comme une probabilité, définie sur l'intervalle `\([0, 1]\)`.

# Régression logistique

La fonction logit du GLM binomial (on parle de "log-odds") :

`$$\text{logit}(p_{i}) = \log \left(\frac{p_{i}}{1 - p_{i}} \right)$$`

--

La cote d'un événement (*odds* en anglais) est le ratio entre la probabilité que l'événement se produise et la probabilité qu'il ne se produise pas. Le logarithme de cette cote est prédit par un modèle linéaire.

`$$\log \left(\frac{p_{i}}{1 - p_{i}} \right) = \alpha + \beta \cdot x_{i}$$`

--

Pour retrouver la probabilité d'un événement, il faut utiliser la fonction de **lien inverse**, la fonction **logistique** (ou logit-inverse) :

`$$p_{i} = \frac{\exp(\alpha + \beta \cdot x_{i})}{1 + \exp(\alpha + \beta \cdot x_{i})}$$`

---

# Modèle de régression logistique

En d'autres termes, on souhaite estimer la probabilité qu'un participant soit présent. On postule que le nombre de participants présents `\(y_{i}\)` (sur `\(n_{i}\)` participants au total) est distribué selon une loi Binomiale avec une probabilité de présence `\(p_{i}\)`.

`$$y_{i} \sim \mathrm{Binomial}(n_{i}, p_{i})$$`

--

Le logarithme de la cote `\(\text{logit}(p_{i})\)` est prédit par une combinaison linéaire de prédicteurs :

`$$\text{logit}(p_{i}) = \log \left(\frac{p_{i}}{1-p_{i}}\right) = \alpha + \beta \times \text{reminder}_{i}$$`

Où `\(\text{logit}(\cdot)\)` est une fonction de lienn, permettant de faire le lien entre l'échelle bornée du paramètre (i.e., `\(0 \leq p \leq 1\)`) est l'échelle (potentiellement non bornée) des prédicteurs.

---

# Modèle de régression logistique

On peut étendre ce modèle sur plusieurs niveaux, permettant au logarithme de la cote moyen (i.e., l'intercept) et l'effet du mail de rappel (i.e., la pente) à varier par chercheur.

&lt;img src="figures/logit.png" width="50%" style="display: block; margin: auto;" /&gt;

&lt;!--

`$$\begin{aligned}
y_{i} &amp;\sim \mathrm{Binomial}(n_{i}, p_{i}) \\
\text{logit}(p_{i}) &amp;= \alpha_{researcher_{[i]}} + \beta_{researcher_{[i]}} \times \text{reminder}_{i} \\
`\begin{bmatrix}
\alpha_{\text{researcher}} \\
\beta_{\text{researcher}} \\
\end{bmatrix}`
&amp;\sim \mathrm{MVNormal}\bigg(\begin{bmatrix} \alpha \\ \beta \end{bmatrix}, \textbf{S}\bigg) \\
\textbf{S} &amp;=
`\begin{pmatrix}
\sigma_{\alpha} &amp; 0 \\
0 &amp; \sigma_{\beta} \\
\end{pmatrix}`
\textbf{R} \begin{pmatrix}
\sigma_{\alpha} &amp; 0 \\
0 &amp; \sigma_{\beta} \\
\end{pmatrix} \\
\alpha &amp;\sim \mathrm{Normal}(0, 10) \\
\beta &amp;\sim \mathrm{Normal}(0, 10) \\
(\sigma_{\alpha}, \sigma_{\beta}) &amp;\sim \mathrm{HalfCauchy}(0, 10) \\
\textbf{R} &amp;\sim \mathrm{LKJcorr}(2) \\
\end{aligned}$$`

--&gt;

---

# Modèle de régression logistique


```r
prior7 &lt;- c(
    prior(normal(0, 10), class = Intercept, coef = ""),
    prior(normal(0, 5), class = b),
    prior(cauchy(0, 10), class = sd),
    prior(lkj(2), class = cor)
    )
```


```r
mod7 &lt;- brm(
    presence | trials(total) ~ 1 + reminder + (1 + reminder | researcher), 
    family = binomial(link = "logit"),
    prior = prior7,
    data = data,
    sample_prior = TRUE,
    file = "models/mod7.rds",
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(),
    control = list(adapt_delta = 0.95) )
```

# Modèle de régression logistique


```r

```

```

## b_Intercept              0.8409732 0.2958252 0.2556849 1.4319815
## b_reminder               1.6062295 0.1782355 1.2556238 1.9694163
## sd_researcher__Intercept 0.8706062 0.2876057 0.4803149 1.5838568

Ces estimations portent sur le logarithme de la cote... Pour les interpréter plus facilement, on doit appliquer la fonction de lien inverse (i.e., la fonction logistique). Par exemple, la probabilité moyenne de présence (toutes choses étant égales par ailleurs) est donnée par `\(p = \exp(\alpha) / (1 + \exp(\alpha) )\)`.

--


```r

a &lt;- fixef(mod7)[1]

# transforming it back to the probability scale (equivalent to plogis(a) )
exp(a) / (1 + exp(a) )
```

```
## [1] 0.6986702
```

# Modèle de régression logistique

Pour évaluer l'effet du mail de rappel, on peut calculer un rapport de cotes ou [odds ratio](https://en.wikipedia.org/wiki/Odds_ratio), donné par `\(\text{exp}(\beta)\)`.

--


```r
fixef(mod7)[2, c(1, 3, 4)] %&gt;% exp
```

```

## 4.983983 3.510027 7.166492

On peut interpréter ce ratio (OR = 5.00, 95% HDI [3.53, 7.27])en disant qu'envoyer un mail de rappel multiplie par 5 les chances (la cote) que le participant soit présent.

# Test d'hypothèse - 1

Le package `brms` offre plusieurs manières de tester des hypothèses. La fonction `hypothesis()` permet de calculer un *evidence ratio* (équivalent à un Bayes factor pour des hypothèses ponctuelles commes `\(\theta = 0\)`). Lorsqu'on teste des hypothèses ponctuelles avec cette fonction, cet *evidence ratio* est un Bayes factor calculé via la méthode de *Savage-Dickey*.


```r
# computing the BF01
(hyp1 &lt;- hypothesis(mod7, "reminder = 0") )
```

```

## for two-sided hypotheses, the value tested against lies outside the 95%-CI.

```

# Test d'hypothèse - 2

On peut également suivre l'approche par comparaison de modèles. Tester l'hypothèse selon laquelle `\(\theta = 0\)` revient à comparer deux modèles : un modèle qui inclut l'effet d'intérêt et un modèle qui ne l'inclut pas.


```r
prior8 &lt;- c(
    prior(normal(0, 10), class = Intercept, coef = ""),
    prior(cauchy(0, 10), class = sd),
    prior(lkj(2), class = cor) )

mod8 &lt;- brm(presence | trials(total) ~ 1 + (1 + reminder | researcher), 
    family = binomial(link = "logit"),
    prior = prior8,
    data = data,
    # this line is important for bridgesampling
    save_pars = save_pars(all = TRUE),
    file = "models/mod8.rds",
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(),
    control = list(adapt_delta = 0.95) )

mod9 &lt;- brm(
    presence | trials(total) ~ 1 + reminder + (1 + reminder | researcher), 
    family = binomial(link = "logit"),
    prior = prior7,
    data = data,
    # this line is important for bridgesampling
    save_pars = save_pars(all = TRUE),
    file = "models/mod9.rds",
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(),
    control = list(adapt_delta = 0.95) )
```

On peut ensuite comparer les vraisemblances marginales de deux modèles (i.e., calculer un Bayes factor). Le package `brms` propose la méthode `bayes_factor()`, qui repose sur une approximation de la vraisemblance marginale via `bridgesampling` ([Gronau &amp; Singmann, 2017](https://arxiv.org/abs/1710.08162)).

# Posterior predictive checking

L'idée du *posterior predictive checking* (PPC) est simple : on va comparer des données simulées (générées) à partir de la distribution postérieure aux données observées. Une fois qu'on a calculé (ou approché) la distribution postérieure, on peut générer des données à partir de la *posterior predictive distribution* :

`$$p(\widetilde{y} | y) = \int p(\widetilde{y} | \theta) p(\theta | y) d \theta$$`

--

Si un modèle est un bon modèle, alors il devrait pouvoir générer des données qui ressemblent aux données observées (e.g., [Gabry, Simpson, Vehtari, Betancourt, &amp; Gelman, 2017](https://arxiv.org/abs/1709.01449)). D'une certaine manière, le *posterior predictive checking* peut être conçu comme une extension de la logique du test d'hypothèse nulle.

# Ajuster le comportement de Stan

En fittant des modèles plus complexes, vous allez probablement rencontrer des messages du genre `There were x divergent transitions after warmup`. Vous pouvez ajuster le comportement de `Stan` via l'argument `control` de la fonction `brm()`.


```r
mod9 &lt;- brm(
    presence | trials(total) ~ 1 + reminder + (1 + reminder | researcher), 
    family = binomial(link = "logit"),
    prior = prior2,
    data = data,
    warmup = 2000, iter = 1e4,
    cores = parallel::detectCores(), # using all available cores
    control = list(adapt_delta = 0.95) # adjusting the delta step size
    )
```

On peut par exemple ajuster le pas de l'algorithme via `adapt_delta` (par défaut fixé à 0.8). Cela ralentit l'échantillonnage mais améliore la qualité des échantillons obtenus. En général, faites attention aux messages d'erreur et warnings générés par `brms`, qui vous donnent des indices utiles permettant de résoudre le problème rencontré.

* **Inférence bayésienne** : Un cadre général de l'estimation de paramètres reposant sur l'utilisation du théorème de Bayes. L'inférence bayésienne peut être vue comme une extension de la logique, où les conclusions (distribution a posteriori) dérivent des prémisses (distribution a priori) et de l'information contenue dans les données (fonction de vraisemblance).

* **Modèles multi-niveaux** : Extensions hiérarchiques (ou pas) du modèle de régression linéaire classique, permettant de prendre en compte des structures de dépendances complexes, dans le but de réaliser des estimations plus précises via *partial pooling* (cf. le concept de *shrinkage*).
